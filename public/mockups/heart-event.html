<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Heart Event — Layout Mockup</title>
<style>
  :root {
    --ink:          #f3e8d2;
    --ink-3:        #a89574;
    --bg:           #141009;
    --bg-2:         #1d1710;
    --bg-3:         #261f16;
    --accent:       #d4943a;
    --accent-2:     #e8b84a;
    --accent-3:     #b87333;
    --ink-5:        rgba(243, 232, 210, 0.12);
    --font-display: 'IM Fell English', 'EB Garamond', Georgia, serif;
    --font-body:    'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    --font-mono:    ui-monospace, 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    height: 100%;
    background: #0a0806;
    color: var(--ink);
    font-family: var(--font-body);
    overflow: hidden;
    user-select: none;
  }

  .phone-frame {
    position: relative;
    width: 100%;
    max-width: 420px;
    height: 100vh;
    max-height: 900px;
    margin: 0 auto;
    background: var(--bg);
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    cursor: pointer;
  }

  .scene-background {
    position: absolute; inset: 0;
    background-image: url('../art/backgrounds/DivinesCommon.png');
    background-size: cover;
    background-position: center;
    background-blend-mode: multiply;
    background-color: rgba(26, 20, 16, 0.35);
  }
  .scene-background::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(
      180deg,
      rgba(26, 20, 16, 0.35) 0%,
      rgba(26, 20, 16, 0.1) 35%,
      rgba(26, 20, 16, 0.55) 65%,
      rgba(26, 20, 16, 0.95) 100%
    );
    pointer-events: none;
  }
  /* Visible fallback when no bg is saved yet */
  .scene-background.missing {
    background-image: none;
    background-color: #1a120a;
  }
  .scene-background.missing::before {
    content: 'DivinesCommon.png';
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    opacity: 0.6;
    border: 1px dashed var(--ink-5);
    padding: 4px 10px;
    border-radius: 3px;
  }

  .scene-character {
    position: absolute;
    left: 50%;
    bottom: 22%;
    transform: translateX(-50%);
    width: 90%;
    pointer-events: none;
    z-index: 1;
    transition: filter 0.3s ease, opacity 0.3s ease;
  }
  .scene-character img {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.5));
  }
  .scene-character.missing img { display: none; }
  .scene-character.missing::after {
    content: 'MarlowSmile.png';
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    border: 1px dashed var(--ink-5);
    padding: 60px 20px;
    border-radius: 4px;
    display: block;
  }

  .phone-frame.mc-speaking .scene-character {
    filter: brightness(0.65) saturate(0.85);
  }

  .scene-character-mc {
    position: absolute;
    left: 12px;
    bottom: 26%;
    width: 130px;
    max-width: 32vw;
    z-index: 1; /* below dialog+speaker tab so her name sits in front */
    pointer-events: none;
    display: none;
  }
  .scene-character-mc img {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.6));
    border-radius: 6px;
  }
  .scene-character-mc.missing img { display: none; }
  .scene-character-mc.missing::after {
    content: 'ElleneThoughtful.png';
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    border: 1px dashed var(--ink-5);
    padding: 40px 10px;
    border-radius: 4px;
    display: block;
    text-align: center;
  }
  .phone-frame.mc-speaking .scene-character-mc {
    display: block;
  }

  .scene-dialog {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    min-height: 26%;
    max-height: 45%;
    background: linear-gradient(180deg, rgba(29,23,16,0.96) 0%, rgba(20,16,9,0.98) 100%);
    border-top: 2px solid var(--accent-3);
    padding: 26px 20px 14px;
    display: flex;
    flex-direction: column;
    z-index: 2;
    box-shadow: 0 -12px 32px rgba(0, 0, 0, 0.5);
  }

  .scene-speaker-tab {
    position: absolute;
    top: -14px;
    left: 18px;
    background: var(--bg-2);
    border: 1px solid var(--accent-3);
    border-radius: 4px;
    padding: 5px 14px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
  }
  .scene-speaker-name {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent-2);
    letter-spacing: 0.4px;
  }

  .scene-page-counter {
    position: absolute;
    top: 8px;
    right: 18px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.5px;
    opacity: 0.7;
  }

  .scene-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    margin-bottom: 10px;
  }
  .scene-title {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 700;
    color: var(--accent-2);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }
  .scene-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.65;
    color: var(--ink);
  }
  .scene-text em {
    color: var(--accent-2);
    font-style: italic;
  }

  .scene-advance-hint {
    text-align: right;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent-3);
    opacity: 0.7;
    margin-top: 6px;
  }

  .mockup-label {
    position: fixed;
    top: 10px;
    left: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    opacity: 0.6;
    z-index: 100;
    max-width: 260px;
    line-height: 1.4;
  }
</style>
</head>
<body>

<div class="mockup-label">
  Heart Event layout mockup · tap to advance pages<br>
  MC bust (Ellene) only appears when she's speaking
</div>

<div class="phone-frame" id="frame">
  <div class="scene-background" id="bg"></div>

  <div class="scene-character" id="npc">
    <img src="../art/characters/MarlowSmile.png" alt="Marlow" id="npcImg" />
  </div>

  <div class="scene-character-mc" id="mc">
    <img src="../art/characters/ElleneThoughtful.png" alt="Ellene" id="mcImg" />
  </div>

  <div class="scene-dialog">
    <div class="scene-speaker-tab" id="tab">
      <span class="scene-speaker-name" id="speaker">Marlow</span>
    </div>

    <div class="scene-page-counter" id="counter">1/4</div>

    <div class="scene-body">
      <div class="scene-title" id="title">The Divines' Common</div>
      <div class="scene-text" id="text"></div>
    </div>

    <div class="scene-advance-hint" id="hint">Tap to continue ›</div>
  </div>
</div>

<script>
  // Detect missing images and swap in a labeled placeholder so the layout is
  // still demonstrable before real art is saved.
  function markMissing(imgEl, containerEl) {
    const probe = new Image();
    probe.onload = () => {};
    probe.onerror = () => containerEl.classList.add('missing');
    probe.src = imgEl.src + '?t=' + Date.now();
  }

  // BG: separate check via fetch since it's a CSS bg.
  fetch('../art/backgrounds/DivinesCommon.png', { method: 'HEAD' })
    .then(r => { if (!r.ok) document.getElementById('bg').classList.add('missing'); })
    .catch(() => document.getElementById('bg').classList.add('missing'));

  markMissing(document.getElementById('npcImg'), document.getElementById('npc'));
  markMissing(document.getElementById('mcImg'),  document.getElementById('mc'));

  const pages = [
    {
      speaker: null,
      body: "The common room hums with low conversation. Marlow is already seated by the window, a cup of something steaming beside him."
    },
    {
      speaker: "Marlow",
      expression: "smile",
      body: "There you are. I was wondering if you'd actually come."
    },
    {
      speaker: "Ellene",
      expression: "thoughtful",
      body: "I almost didn't. I wasn't sure what to say."
    },
    {
      speaker: "Marlow",
      expression: "smile",
      body: "You don't have to say anything. *Sit.* The tea is still warm."
    }
  ];

  const frame   = document.getElementById('frame');
  const speaker = document.getElementById('speaker');
  const counter = document.getElementById('counter');
  const title   = document.getElementById('title');
  const text    = document.getElementById('text');
  const hint    = document.getElementById('hint');
  const tab     = document.getElementById('tab');

  let idx = 0;

  function renderInline(str) {
    return str.replace(/\*(.+?)\*/g, '<em>$1</em>');
  }

  function render() {
    const p = pages[idx];

    if (p.speaker) {
      tab.style.display = '';
      speaker.textContent = p.speaker;
    } else {
      tab.style.display = 'none';
    }

    if (p.speaker === 'Ellene') {
      frame.classList.add('mc-speaking');
    } else {
      frame.classList.remove('mc-speaking');
    }

    title.style.display = idx === 0 ? '' : 'none';

    counter.textContent = `${idx + 1}/${pages.length}`;
    text.innerHTML = renderInline(p.body);
    hint.textContent = idx === pages.length - 1 ? 'Tap to restart ↻' : 'Tap to continue ›';
  }

  frame.addEventListener('click', () => {
    idx = (idx + 1) % pages.length;
    render();
  });

  render();
</script>

</body>
</html>
